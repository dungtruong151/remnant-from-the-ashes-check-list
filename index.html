<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remnant: From the Ashes — Checklist</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <div id="topbar">
    <div id="topbar-left">
      <span id="game-title">REMNANT: FROM THE ASHES</span>
      <span id="progress-text"><span id="total-collected">0/0</span> items · <span id="total-progress">0%</span></span>
    </div>
    <div id="topbar-right">
      <button id="btn-profiles" class="tb-btn">👤 <span id="profile-indicator">...</span></button>
      <button id="btn-builds" class="tb-btn">🏆 Builds</button>
      <button id="btn-analyzer" class="tb-btn">🔍 Analyzer</button>
      <button id="btn-reset" class="tb-btn tb-btn--danger">Reset</button>
    </div>
  </div>

  <div id="toolbar">
    <input type="text" id="search-input" placeholder="Tìm kiếm..." />
    <select id="filter-rarity">
      <option value="all">Tất cả</option>
      <option value="normal">Thường</option>
      <option value="rare">Hiếm</option>
      <option value="boss">Boss</option>
      <option value="dlc">DLC</option>
    </select>
    <select id="filter-status">
      <option value="all">Mọi trạng thái</option>
      <option value="collected">Đã có</option>
      <option value="missing">Chưa có</option>
    </select>
    <div id="progress-bar-wrap"><div id="progress-bar-fill"></div></div>
    <span id="total-sections-text">0/0 danh mục</span>
  </div>

  <nav id="category-nav"></nav>
  <main id="app"></main>

  <script src="data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/popup.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/builds.js"></script>
  <script src="js/analyzer.js"></script>
  <script src="js/profiles.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
